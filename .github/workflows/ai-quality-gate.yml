# =============================================================================
# AI Quality Gate — GitHub Actions Workflow (TEMPLATE)
# =============================================================================
#
# Questo e' un TEMPLATE di esempio per una pipeline CI con quality gate
# specifici per progetti co-prodotti con AI.
#
# COME USARE QUESTO TEMPLATE:
# 1. Copia questo file in .github/workflows/ai-quality-gate.yml del tuo progetto
# 2. Crea gli script referenziati (vedi commenti inline)
# 3. Personalizza i check in base al tuo stack e alle tue convenzioni
# 4. I primi 2-3 sprint, lascia i check in modalita' warning (non bloccanti)
#    per calibrare i threshold senza rallentare il team
#
# PREREQUISITI:
# - scripts/validate-claude-md.sh  — verifica che CLAUDE.md esista e sia valido
# - scripts/check-doc-budget.sh    — verifica che i documenti rispettino i budget righe
#
# Riferimenti nel manuale: sezione 2.9 (Hooks), T.10 (CI/CD per codice AI)
# =============================================================================

name: AI Quality Gate

# Triggera su push e pull request verso main/develop.
# Personalizza i branch in base al tuo workflow.
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  quality-gate:
    runs-on: ubuntu-latest

    steps:
      # -----------------------------------------------------------------------
      # Step 1: Checkout del codice
      # -----------------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # Step 2: Validazione CLAUDE.md
      # -----------------------------------------------------------------------
      # Verifica che il file CLAUDE.md esista e contenga le sezioni obbligatorie.
      # Lo script validate-claude-md.sh deve verificare almeno:
      #   - Il file CLAUDE.md esiste nella root del progetto
      #   - Contiene le sezioni: Progetto, Comandi, Struttura, Convenzioni
      #   - Non e' vuoto o troppo corto (< 10 righe)
      #
      # Esempio minimo di validate-claude-md.sh:
      #   #!/usr/bin/env bash
      #   if [ ! -f CLAUDE.md ]; then echo "CLAUDE.md mancante"; exit 1; fi
      #   for section in "## Progetto" "## Comandi" "## Struttura" "## Convenzioni"; do
      #     if ! grep -q "$section" CLAUDE.md; then
      #       echo "Sezione mancante: $section"; exit 1
      #     fi
      #   done
      #   echo "CLAUDE.md valido"
      - name: Valida CLAUDE.md
        run: bash scripts/validate-claude-md.sh

      # -----------------------------------------------------------------------
      # Step 3: Budget righe documenti
      # -----------------------------------------------------------------------
      # Verifica che i documenti chiave non superino i budget di righe stabiliti.
      # Documenti troppo lunghi degradano la qualita' delle risposte AI
      # perche' occupano troppo context window.
      #
      # Esempio minimo di check-doc-budget.sh:
      #   #!/usr/bin/env bash
      #   MAX_CLAUDE_MD=120
      #   lines=$(wc -l < CLAUDE.md)
      #   if [ "$lines" -gt "$MAX_CLAUDE_MD" ]; then
      #     echo "CLAUDE.md troppo lungo: $lines righe (max $MAX_CLAUDE_MD)"
      #     exit 1
      #   fi
      #   echo "Budget righe OK"
      - name: Check budget righe documenti
        run: bash scripts/check-doc-budget.sh

      # -----------------------------------------------------------------------
      # Step 4: (Opzionale) Claude Code Review automatica
      # -----------------------------------------------------------------------
      # Decommenta questo step per aggiungere una review automatica con Claude.
      # Richiede:
      #   - ANTHROPIC_API_KEY configurata come secret del repository
      #   - Claude Code installato (npm install -g @anthropic-ai/claude-code)
      #
      # Nota: questo step ha un costo API per ogni esecuzione.
      # Consigliato solo per PR critiche o come check non bloccante.
      #
      # - name: Claude Code Review
      #   env:
      #     ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      #   run: |
      #     npx -y @anthropic-ai/claude-code --print \
      #       "Analizza le modifiche in questa PR. Concentrati su:
      #        1. Vulnerabilita' di sicurezza (OWASP top 10)
      #        2. Pattern drift rispetto alle convenzioni in CLAUDE.md
      #        3. Test tautologici o placeholder
      #        Rispondi con una lista di issue con severita' (CRITICAL/WARNING/INFO).
      #        Se non trovi problemi, rispondi 'Nessun problema rilevato'."
